<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagaMenos | Responsive Minimalism</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Glow Background Effects -->
    <div class="glow-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <main class="app-wrapper">
            <header class="app-header" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <!-- Logo Mascot SVG -->
                    <svg width="34" height="34" viewBox="0 0 100 100" class="logo-svg" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <rect x="15" y="20" width="70" height="50" rx="6" stroke="currentColor" stroke-width="6" />
                        <path d="M35 70L30 85H70L65 70" stroke="currentColor" stroke-width="6" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <circle cx="40" cy="40" r="4" fill="currentColor" />
                        <circle cx="60" cy="40" r="4" fill="currentColor" />
                        <path d="M40 55C45 60 55 60 60 55" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                    </svg>
                    <span class="logo-text">PagaMenos</span>
                </div>

                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="search-container">
                        <div class="search-box" id="search-box" onclick="toggleSearch(event)">
                            <i data-lucide="search" class="text-muted"></i>
                            <input type="text" id="busqueda" placeholder="Buscar..." autocomplete="off">
                        </div>
                    </div>

                    <div class="filter-toggle" id="filter-btn" onclick="toggleFilters(event)" title="Filtros">
                        <i data-lucide="sliders-horizontal" style="width: 20px; height: 20px;"></i>
                    </div>
                </div>
            </header>

            <div class="filters-row">
                <div id="unified-filters" class="unified-scroll-row">
                    <!-- Se carga dinámicamente: Bancos | Categorías -->
                </div>
            </div>

            <div id="result-count" class="result-count"></div>
            <div id="resultados" class="promos-container">
                <!-- Cargado por JS -->
            </div>

            <footer class="bottom-nav">
                <a href="index.html" class="nav-link active"><i data-lucide="home" style="width: 28px; height: 28px;"></i></a>
                <a href="#" class="nav-link"><i data-lucide="map" style="width: 28px; height: 28px;"></i></a>
                <a href="profile.html" class="nav-link"><i data-lucide="user" style="width: 28px; height: 28px;"></i></a>
            </footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>

</html>
